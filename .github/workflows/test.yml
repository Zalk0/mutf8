name: Tests
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        cfg:
          - {os: windows-2025, architecture: x64}
          - {os: windows-11-arm, architecture: arm64}
          - {os: macos-26-intel, architecture: x64}
          - {os: macos-26, architecture: arm64}
          - {os: ubuntu-26.04, architecture: x64}
          - {os: ubuntu-26.04-arm, architecture: arm64}

    runs-on: ${{ matrix.cfg.os }}
    timeout-minutes: 45

    steps:
    - name: Clone
      uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        architecture: ${{ matrix.cfg.architecture }}

    - name: Installing python dependencies
      run: |
        pip install -e .[test]

    - name: Running tests
      run: |
        pytest
