name: Release
on:
  release:
    types: [published]
permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-26-intel, macos-26, ubuntu-26.04, ubuntu-26.04-arm, windows-2025, windows-11-arm]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Clone repository
      uses: actions/checkout@v7.0.0
      with:
        persist-credentials: false

    - name: Build wheels
      uses: pypa/cibuildwheel@v4.1.0

    - name: Upload wheels
      uses: actions/upload-artifact@v7.0.1
      with:
        name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
        path: ./wheelhouse/*.whl

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Clone repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Download wheels
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: 3.x

      - name: Install dependencies
        run: |
          pip install build twine

      - name: Build source
        run: |
          python -m build --sdist .

      - name: Publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TEST_TOKEN }}
        run: |
          twine upload dist/* --skip-existing --repository testpypi
